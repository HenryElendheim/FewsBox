name: Build

on:
  push:
    branches: [main, testing]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Engine tests
        run: ./gradlew :engine:test

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk FewsBox.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FewsBox-apk
          path: FewsBox.apk

      # When a release is published, put the APK on it so people can
      # install without building anything.
      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" FewsBox.apk --clobber
